name: CI

# Build and test on every push and pull request to the main branch.
# Tag pushes are ignored here so tagged releases only run the release
# workflow (release.yml), which calls the same reusable test workflow.
on:
  push:
    branches: [master]
    tags-ignore: ['**']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-test:
    # A release bumps the version on master AND pushes a tag. The tag runs
    # release.yml (which already runs the tests); the accompanying
    # "Release vX.Y.Z" commit on master would otherwise also trigger CI here.
    # (head_commit is null for PRs / manual runs, so those proceed.)
    if: ${{ !startsWith(github.event.head_commit.message, 'Release v') }}
    uses: ./.github/workflows/test.yml
