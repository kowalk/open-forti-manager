name: Release

# Trigger on version tags (v1.2.3) following semantic versioning
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            libayatana-appindicator3-dev \
            libx11-dev \
            libglib2.0-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build release binary
        run: cargo build --release

      - name: Build .deb package
        # cargo-deb embeds debian/postinst, which runs
        # `setcap cap_net_admin+eip /usr/bin/open-forti-manager` after install
        # so the native VPN engine can create the TUN device without root.
        run: cargo deb --no-build

      - name: Find .deb file
        id: deb
        run: |
          DEB=$(ls target/debian/*.deb | head -1)
          echo "path=$DEB" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $DEB)" >> "$GITHUB_OUTPUT"

      - name: Verify postinst grants cap_net_admin
        run: |
          DEB="${{ steps.deb.outputs.path }}"
          if ! dpkg-deb --info "$DEB" postinst | grep -q "cap_net_admin+eip"; then
            echo "::error::postinst is missing the setcap cap_net_admin step"
            exit 1
          fi
          echo "postinst correctly sets cap_net_admin on install."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.deb.outputs.path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
